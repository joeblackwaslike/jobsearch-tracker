default_language_version:
  python: python3.12
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v4.4.0"
    hooks:
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.9.2"
    hooks:
      - id: ruff
        args: [--exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/wemake-services/wemake-python-styleguide
    rev: 1.0.0
    hooks:
      - id: wemake-python-styleguide

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "v3.0.3"
    hooks:
      - id: prettier

  - repo: local
    hooks:
      - id: typescript-check
        name: TypeScript type check
        language: system
        entry: bash -c "cd frontend && bunx tsc --noEmit"
        pass_filenames: false
        types: [ts, tsx]

      - id: biome-check
        name: Biome lint + format check
        language: system
        entry: bash -c "cd frontend && bunx biome check ."
        pass_filenames: false
        types: [ts, tsx, json]

      - id: vitest
        name: Vitest unit tests
        language: system
        entry: bash -c "cd frontend && bun run test --run"
        pass_filenames: false
        types: [ts, tsx]

      - id: build-check
        name: Vite build check
        language: system
        entry: bash -c "cd frontend && bun run build"
        pass_filenames: false
        stages: [push]
